<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aran Nachmias — VP Product & COO</title>
<meta name="description" content="Aran Nachmias — Senior operations & product leader. VP Product & COO. Strategy to execution, scaling products, teams & systems.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16181d; --sub:#5a6070; --accent:#0f4c81; --accent-soft:#e8f0f7;
  --line:#e6e8ec; --bg:#ffffff; --bg-alt:#f7f8fa; --max:880px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Heebo',system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.65;font-size:16.5px}
.wrap{max-width:var(--max);margin:0 auto;padding:0 28px}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* top bar */
.topbar{position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);z-index:10}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:56px}
.topbar .logo{font-weight:700;font-size:15px;letter-spacing:.4px}
.lang-toggle{border:1px solid var(--line);background:#fff;border-radius:20px;padding:5px 16px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;color:var(--accent)}
.lang-toggle:hover{background:var(--accent-soft)}

/* hero */
.hero{padding:64px 0 48px}
.hero .wrap{display:flex;gap:44px;align-items:center;flex-wrap:wrap}
.hero-text{flex:1;min-width:300px}
.hero h1{font-size:44px;font-weight:800;line-height:1.15;letter-spacing:-.5px}
.hero .role{font-size:20px;font-weight:600;color:var(--accent);margin-top:8px}
.hero .tagline{color:var(--sub);margin-top:14px;max-width:560px}
.hero img{width:168px;height:168px;border-radius:50%;object-fit:cover;border:4px solid var(--accent-soft)}
.contact-row{display:flex;gap:20px;flex-wrap:wrap;margin-top:22px;font-size:14.5px;font-weight:500}
.contact-row a,.contact-row span{color:var(--sub)}
.contact-row a:hover{color:var(--accent)}

/* metrics */
.metrics{background:var(--bg-alt);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:36px 0}
.metrics .wrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:26px;text-align:center}
.metric .num{font-size:30px;font-weight:800;color:var(--accent);line-height:1.1}
.metric .lbl{font-size:13.5px;color:var(--sub);margin-top:4px}
.metric{position:relative;cursor:pointer;border-radius:10px;padding:6px 4px;transition:background .15s}
.metric:hover{background:#eef1f5}
.metric .lbl::after{content:" ⓘ";color:var(--accent);font-size:11px}
.metric .tip{display:none;position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;font-weight:400;line-height:1.55;padding:12px 15px;border-radius:10px;width:250px;z-index:20;text-align:start;box-shadow:0 10px 28px rgba(0,0,0,.22)}
.metric.open .tip{display:block}

/* sections */
section{padding:56px 0}
section.alt{background:var(--bg-alt);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
h2{font-size:26px;font-weight:800;margin-bottom:26px;letter-spacing:-.3px}
h2::after{content:"";display:block;width:44px;height:3px;background:var(--accent);border-radius:2px;margin-top:8px}

/* experience */
.job{padding:0 0 30px 26px;border-inline-start:2px solid var(--line);position:relative;margin-inline-start:6px}
[dir="rtl"] .job{padding:0 26px 30px 0}
.job:last-child{padding-bottom:4px}
.job::before{content:"";position:absolute;inset-inline-start:-7px;top:7px;width:12px;height:12px;border-radius:50%;background:#fff;border:3px solid var(--accent)}
.job .head{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:baseline}
.job h3{font-size:18px;font-weight:700}
.job .org{color:var(--accent);font-weight:600}
.job .dates{font-size:13.5px;color:var(--sub);white-space:nowrap}
.job ul{margin-top:8px;padding-inline-start:18px;color:#3a3f4c;font-size:15.5px}
.job li{margin-bottom:4px}

/* skills */
.chipset{display:flex;flex-wrap:wrap;gap:10px}
.chip{background:#fff;border:1px solid var(--line);border-radius:18px;padding:6px 16px;font-size:14.5px;font-weight:500}
.chip.hl{background:var(--accent-soft);border-color:#c6d9ea;color:var(--accent);font-weight:600}
.skill-group{margin-bottom:22px}
.skill-group h4{font-size:14px;text-transform:uppercase;letter-spacing:1px;color:var(--sub);margin-bottom:10px;font-weight:700}
[dir="rtl"] .skill-group h4{letter-spacing:0}

/* cards (posts / education) */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:22px;display:flex;flex-direction:column;transition:box-shadow .2s, transform .2s}
.card:hover{box-shadow:0 6px 22px rgba(15,76,129,.10);transform:translateY(-2px)}
.card h3{font-size:16.5px;font-weight:700;line-height:1.4}
.card p{font-size:14.5px;color:var(--sub);margin-top:8px;flex:1}
.card .link{margin-top:14px;font-size:14px;font-weight:600}
.card .tag{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
[dir="rtl"] .card .tag{letter-spacing:0}

/* recommendations */
.rec-card{border-inline-start:3px solid var(--accent)}
.rec-card p{font-style:italic;color:#3a3f4c;font-size:15px}
.rec-card .who{margin-top:14px;font-size:14px}
.rec-card .who .nm{font-weight:700;color:var(--ink)}
.rec-card .who .rl{color:var(--sub);display:block}

/* two-col */
.twocol{display:grid;grid-template-columns:1fr 1fr;gap:40px}
@media(max-width:720px){.twocol{grid-template-columns:1fr}.hero h1{font-size:34px}.hero .wrap{gap:28px}}

/* footer */
footer{padding:48px 0 56px;text-align:center;border-top:1px solid var(--line)}
footer .cta{font-size:22px;font-weight:700}
footer .sub{color:var(--sub);margin-top:6px}
.footer-links{display:flex;gap:22px;justify-content:center;margin-top:20px;font-weight:600;flex-wrap:wrap}

@media print{.topbar,.lang-toggle{display:none}section{padding:24px 0}.hero{padding:24px 0}}
</style>
</head>

let lang = localStorage.getItem('cv_lang') || 'en';

function render(){
  const t = T[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = lang==='he' ? 'rtl' : 'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.getAttribute('data-i18n');
    if(t[k]!==undefined) el.textContent = t[k];
  });
  document.getElementById('langBtn').textContent = t.langBtn;
  const jobHtml = arr => arr.map(j=>`
    <div class="job">
      <div class="head"><h3>${j.t} <span class="org">· ${j.o}</span></h3><span class="dates">${j.d}</span></div>
      <ul>${j.b.map(x=>`<li>${x}</li>`).join('')}</ul>
    </div>`).join('');
  document.getElementById('jobs').innerHTML = jobHtml(t.jobs);
  document.getElementById('miljobs').innerHTML = jobHtml(t.mil);
  document.getElementById('reccards').innerHTML = t.recs.map(r=>`<div class="card rec-card"><p dir="auto">${r.txt}</p><div class="who"><a href="${r.url}" target="_blank" rel="noopener" class="nm">${r.n}</a><span class="rl">${r.r}</span></div></div>`).join('');
  const chips=(id,arr,hl)=>{document.getElementById(id).innerHTML=arr.map((c,i)=>`<span class="chip${hl&&i<4?' hl':''}">${c}</span>`).join('');};
  chips('chips1',t.chips1,true); chips('chips2',t.chips2,false); chips('chips3',t.chips3,false);
}

document.querySelectorAll('.metric').forEach(m=>{
  m.addEventListener('click',()=>{
    document.querySelectorAll('.metric').forEach(x=>{if(x!==m)x.classList.remove('open')});
    m.classList.toggle('open');
  });
});
document.addEventListener('click',e=>{
  if(!e.target.closest('.metric')) document.querySelectorAll('.metric').forEach(x=>x.classList.remove('open'));
});

function toggleLang(){
  lang = lang==='en' ? 'he' : 'en';
  try{localStorage.setItem('cv_lang',lang);}catch(e){}
  render();
}
render();
</script>
